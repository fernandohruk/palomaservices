    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1c1e21;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: #fff;
            padding: 15px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        /* --- NUEVO: Contenedor de Perfil --- */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 5px;
        }

        .profile-pic {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #007bff;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
        }

        .profile-name {
            font-weight: bold;
            font-size: 1.1em;
            margin: 0;
        }

        .profile-details {
            font-size: 0.9em;
            color: #65676b;
            margin: 2px 0;
        }

        .profile-bio {
            font-size: 0.85em;
            color: #333;
            font-style: italic;
            margin: 0;
        }

        /* --- Estilos del Video --- */
        .video-wrapper {
            width: 100%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            line-height: 0;
            margin-bottom: 20px;
        }

        .video-wrapper video {
            width: 100%;
            height: auto;
            max-height: 70vh;
            display: block;
            object-fit: contain;
        }

        /* --- Estilos del Texto y Botón --- */
        .text-container {
            margin-bottom: 20px;
            text-align: center;
            padding: 0 10px;
        }

        .text-container p {
            font-size: 1.1em;
            line-height: 1.4;
            margin: 0;
        }

        .button-container {
            text-align: center;
            padding-bottom: 10px;
        }

        .cta-button {
            background-color: #007bff;
            color: #fff;
            padding: 16px 32px;
            text-decoration: none;
            border-radius: 50px; /* Más redondeado para móviles */
            font-weight: bold;
            font-size: 1.1em;
            display: inline-block;
            width: 80%; /* Botón más grande al tacto */
            transition: transform 0.2s;
        }

        .cta-button:active {
            transform: scale(0.95); /* Efecto de clic */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-header">

            <div class="profile-info">
                <p class="profile-name">Paloma Ortega</p>
                <p class="profile-details">30 años</p>
                <p class="profile-bio">Te muestro un poco de lo que sé hacer...</p>
            </div>
        </div>

        <div class="video-wrapper">
            <video controls playsinline preload="metadata">
                <source src="https://cdn.videy.co/5gZHYTbc1.mp4" type="video/mp4">
                Tu navegador no soporta el video.

        </div>

        <div class="text-container">
            <p>¡Espero conocerte para hacerte esto y más!</p>
            <p>Servicios por Turnos</p>
        </div>

        <div class="button-container">

        </div>
    </div>

</body>
